{% extends "base.html" %}
{% block content %}
<div class="contenedor" style="text-align: center; padding: 80px 20px;">
    <div style="font-family: var(--font-titulo); font-size: 8rem; color: var(--accent); line-height: 1;">404</div>
    <h1 style="font-family: var(--font-titulo); font-size: 2.5rem; text-transform: uppercase; margin: 20px 0;">Página no encontrada</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem; margin: 20px 0 40px;">Esta página no existe o fue movida.</p>
    <a href="/" style="background: var(--accent); color: #fff; padding: 14px 32px; font-family: var(--font-cuerpo); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; border-radius: 2px;">Volver al inicio</a>
</div>
{% endblock content %}
